const AppStorage = {
  _cfg() { try { return JSON.parse(localStorage.getItem("ehc_cfg")||"{}"); } catch{return{};} },
  async _bin() {
    const c=this._cfg();
    try {
      const r=await fetch("https://api.jsonbin.io/v3/b/"+c.binId+"/latest",{headers:{"X-Master-Key":c.key,"X-Bin-Meta":"false"}});
      if(!r.ok) return {};
      const d=await r.json(); return d.record||d;
    } catch{return{};}
  },
  async get(k) {
    const c=this._cfg();
    if(c.key&&c.binId){const b=await this._bin();return b[k]!==undefined?{value:typeof b[k]==="string"?b[k]:JSON.stringify(b[k])}:null;}
    const v=localStorage.getItem("ehc_"+k);return v?{value:v}:null;
  },
  async set(k,v) {
    const c=this._cfg();
    if(c.key&&c.binId){
      try{const b=await this._bin();b[k]=typeof v==="string"?JSON.parse(v):v;
        await fetch("https://api.jsonbin.io/v3/b/"+c.binId,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":c.key},body:JSON.stringify(b)});
      }catch{localStorage.setItem("ehc_"+k,v);}
    } else { localStorage.setItem("ehc_"+k,v); }
  }
};

// ─── Hilfsfunktionen ──────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function fmtCHF(n) {
  return new Intl.NumberFormat("de-CH", { style: "currency", currency: "CHF", maximumFractionDigits: 0 }).format(Number(n) || 0);
}

function fmtDate(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("de-CH", { day: "2-digit", month: "2-digit", year: "numeric" });
}

function daysUntil(d) {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(d); end.setHours(0,0,0,0);
  return Math.round((end - today) / 86400000);
}

function contractStatus(s) {
  const days = daysUntil(s.vertragsende);
  if (days === null) return { key: "unbekannt", label: "Kein Enddatum", tone: "neutral" };
  if (days < 0) return { key: "abgelaufen", label: "Abgelaufen", tone: "danger" };
  if (days <= 90) return { key: "laeuft_aus", label: `Läuft aus (${days} Tg.)`, tone: "warn" };
  return { key: "aktiv", label: "Aktiv", tone: "ok" };
}

function effektiverWert(s) {
  return (s.zahlungskomponenten || []).reduce((a, c) => a + (Number(c.betrag) || 0), 0);
}
function listenwert(s) {
  return (s.werbeleistungen || []).reduce((a, w) => a + (Number(w.wert) || 0), 0);
}
function signedBetrag(c) {
  const v = Number(c.betrag) || 0;
  return c.richtung === "Ausgabe" ? -v : v;
}
function hasOverdue(s) {
  return (s.zahlungskomponenten || []).some((c) => c.status === "Überfällig");
}
function matchesSearch(s, term) {
  if (!term) return true;
  const t = term.toLowerCase();
  return s.name.toLowerCase().includes(t)
    || (s.werbeleistungen || []).some((w) => w.name.toLowerCase().includes(t))
    || (s.ehcLeistungen || "").toLowerCase().includes(t)
    || (s.zahlungskomponenten || []).some((c) => (c.beschreibung || "").toLowerCase().includes(t));
}

// Migriert alte Offerten (einzelnes wert-Feld) ins neue zweigeteilte Format
function migrateOfferte(o) {
  if (o.wertCHF !== undefined || o.wertBarter !== undefined) return o;
  return { ...o, wertCHF: o.wert || "", wertBarter: "", wert: undefined };
}

// Migriert alte Leads (offerte/offerteWert als Strings) ins neue Array-Format
function migrateLead(l) {
  const base = (() => {
    if (Array.isArray(l.offerten)) return l;
    const offerten = [];
    if (l.offerte || l.offerteWert) {
      offerten.push({ id: uid(), datum: l.letzterKontakt || new Date().toISOString().slice(0, 10), beschreibung: l.offerte || "", wertCHF: l.offerteWert || "", wertBarter: "" });
    }
    const { offerte, offerteWert, ...rest } = l;
    return { ...rest, offerten };
  })();
  // Auch bestehende Offerten-Einträge auf wertCHF/wertBarter migrieren
  return { ...base, offerten: (base.offerten || []).map(migrateOfferte) };
}

function aktuelleOfferte(lead) {
  const offs = lead.offerten || [];
  return offs.length > 0 ? offs[offs.length - 1] : null;
}

// ─── PDF → Formular (KI-Extraktion) ─────────────────────────────────────────
async function extractSponsorFromPdf(file) {
  const base64Data = await new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Datei konnte nicht gelesen werden"));
    r.readAsDataURL(file);
  });

  const systemPrompt = `Du liest EHC Chur Partnerverträge und extrahierst sie in ein striktes JSON-Format. Antworte NUR mit validem JSON, keine Backticks, kein Vortext.

Format:
{
  "name": "Firmenname",
  "kategorie": "Hauptsponsor"|"Gold"|"Silber"|"Bronze"|"Partner",
  "vertragsbeginn": "YYYY-MM-DD",
  "vertragsende": "YYYY-MM-DD (EHC-Verträge laufen bis 30.4. des Geschäftsjahres)",
  "optionVerlaengerung": true/false,
  "werbeleistungen": [{"name": "Bezeichnung aus Ziff. 3","wert": Zahl oder ""}],
  "zahlungskomponenten": [{"typ":"Cash (CHF)"|"WIR-Geld"|"Barter (Sach-/Dienstleistung)","richtung":"Einnahme"|"Ausgabe","betrag": Zahl oder "","status":"Ausstehend","beschreibung":"Zahlungsfrist/Details"}],
  "ehcLeistungen": "alle Leistungen aus Ziff. 7, kommagetrennt",
  "ansprechpartnerName": "Name Partner-Kontaktperson",
  "ansprechpartnerRolle": "Funktion",
  "internKontaktEHC": "EHC-Kontaktpersonen kommagetrennt",
  "notizen": "Besonderheiten und Unklarheiten die geprüft werden sollten"
}

Richtung: Einnahme = Partner zahlt an EHC. Ausgabe = EHC zahlt an Partner. Bei Unsicherheit in notizen vermerken. Zahlen ohne Tausendertrennzeichen (15000 statt 15'000).`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": (window.__ehcAkey || localStorage.getItem("ehc_akey") || "") },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      system: systemPrompt,
      messages: [{ role: "user", content: [
        { type: "document", source: { type: "base64", media_type: "application/pdf", data: base64Data } },
        { type: "text", text: "Extrahiere diesen Partnervertrag ins vorgegebene JSON-Format." },
      ]}],
    }),
  });

  if (!resp.ok) throw new Error("API-Fehler");
  const data = await resp.json();
  const textBlock = (data.content || []).find((b) => b.type === "text");
  if (!textBlock) throw new Error("Keine Antwort");
  const p = JSON.parse(textBlock.text.replace(/```json|```/g, "").trim());

  return {
    id: uid(),
    name: p.name || "",
    kategorie: TIERS.includes(p.kategorie) ? p.kategorie : "Partner",
    vertragsbeginn: p.vertragsbeginn || "",
    vertragsende: p.vertragsende || "",
    optionVerlaengerung: !!p.optionVerlaengerung,
    werbeleistungen: Array.isArray(p.werbeleistungen) && p.werbeleistungen.length
      ? p.werbeleistungen.map((w) => ({ id: uid(), name: w.name || "", wert: w.wert === "" ? "" : w.wert }))
      : [{ id: uid(), name: "", wert: "" }],
    zahlungskomponenten: Array.isArray(p.zahlungskomponenten) && p.zahlungskomponenten.length
      ? p.zahlungskomponenten.map((c) => ({
          id: uid(),
          typ: VERTRAGSTYPEN.includes(c.typ) ? c.typ : "Cash (CHF)",
          richtung: RICHTUNGEN.includes(c.richtung) ? c.richtung : "Einnahme",
          betrag: c.betrag === "" ? "" : c.betrag,
          status: PAY_STATUS.includes(c.status) ? c.status : "Ausstehend",
          beschreibung: c.beschreibung || "",
        }))
      : [{ id: uid(), typ: "Cash (CHF)", richtung: "Einnahme", betrag: "", status: "Ausstehend", beschreibung: "" }],
    ehcLeistungen: p.ehcLeistungen || "",
    ansprechpartnerName: p.ansprechpartnerName || "",
    ansprechpartnerRolle: p.ansprechpartnerRolle || "",
    ansprechpartnerEmail: "",
    ansprechpartnerTelefon: "",
    internKontaktEHC: p.internKontaktEHC || "",
    notizen: (p.notizen ? p.notizen + " " : "") + "⚠️ Automatisch aus PDF extrahiert – bitte alle Angaben prüfen.",
  };
}

function SponsorModal({ initial, onSave, onClose }) {
  const [form, setForm] = useState(initial);
  const [extracting, setExtracting] = useState(false);
  const [extractErr, setExtractErr] = useState("");
  const set = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const setCheck = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.checked }));

  function updSpec(id, k, v) { setForm((f) => ({ ...f, werbeleistungen: f.werbeleistungen.map((w) => w.id === id ? { ...w, [k]: v } : w) })); }
  function addSpec() { setForm((f) => ({ ...f, werbeleistungen: [...f.werbeleistungen, { id: uid(), name: "", wert: "" }] })); }
  function rmSpec(id) { setForm((f) => ({ ...f, werbeleistungen: f.werbeleistungen.filter((w) => w.id !== id) })); }
  function updComp(id, k, v) { setForm((f) => ({ ...f, zahlungskomponenten: f.zahlungskomponenten.map((c) => c.id === id ? { ...c, [k]: v } : c) })); }
  function addComp() { setForm((f) => ({ ...f, zahlungskomponenten: [...f.zahlungskomponenten, { id: uid(), typ: "Cash (CHF)", richtung: "Einnahme", betrag: "", status: "Ausstehend", beschreibung: "" }] })); }
  function rmComp(id) { setForm((f) => ({ ...f, zahlungskomponenten: f.zahlungskomponenten.filter((c) => c.id !== id) })); }

  async function handlePdf(e) {
    const file = e.target.files?.[0]; e.target.value = "";
    if (!file) return;
    if (file.type !== "application/pdf") { setExtractErr("Bitte eine PDF-Datei auswählen."); return; }
    setExtracting(true); setExtractErr("");
    try { setForm({ ...(await extractSponsorFromPdf(file)), id: form.id }); }
    catch { setExtractErr("Konnte nicht gelesen werden – bitte manuell erfassen."); }
    finally { setExtracting(false); }
  }

  const lw = form.werbeleistungen.reduce((a, w) => a + (Number(w.wert) || 0), 0);
  const ew = form.zahlungskomponenten.reduce((a, c) => a + (Number(c.betrag) || 0), 0);

  const overlay = { position: "fixed", inset: 0, zIndex: 50, overflowY: "auto", background: "rgba(0,0,0,0.5)" };
  const panel = { width: "100%", maxWidth: 680, margin: "0 auto", background: C.PAPER, borderRadius: "12px 12px 0 0", borderTop: `4px solid ${C.RED}`, paddingBottom: 80 };
  const section = { borderTop: `1px solid ${C.LINE}`, marginTop: 16, paddingTop: 16 };
  const sectionTitle = { fontSize: 11, textTransform: "uppercase", letterSpacing: "0.12em", fontWeight: 700, color: C.LABEL, fontFamily: "'Oswald', sans-serif", marginBottom: 10 };
  const grid2 = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 };
  const cardStyle = { border: `1px solid ${C.LINE}`, borderRadius: 6, padding: 12, background: "#fff", marginBottom: 8 };
  const footer = { position: "fixed", bottom: 0, left: 0, right: 0, background: C.PAPER, borderTop: `1px solid ${C.LINE}`, padding: "12px 24px", display: "flex", gap: 12, zIndex: 51 };

  return (
    <div style={overlay}>
      <div style={panel}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 24px 12px", borderBottom: `1px solid ${C.LINE}`, background: C.PAPER }}>
          <h2 style={{ fontSize: 18, fontWeight: 600, color: C.INK, fontFamily: "'Oswald', sans-serif", margin: 0 }}>
            {initial.name ? "Sponsor bearbeiten" : "Neuer Sponsor"}
          </h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: C.SLATE, padding: 4 }}><X size={20} /></button>
        </div>

        <div style={{ padding: 24, display: "flex", flexDirection: "column", gap: 16 }}>
          {/* PDF-Upload */}
          <div style={{ border: `1.5px dashed ${C.LINE}`, borderRadius: 8, padding: 16, background: "#fff" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <Sparkles size={15} style={{ color: C.RED2 }} />
              <span style={{ fontWeight: 700, fontSize: 13, color: C.INK }}>Unterzeichneten Vertrag als PDF einlesen</span>
            </div>
            <p style={{ fontSize: 12, color: C.SLATE, marginBottom: 10 }}>Füllt die Felder automatisch aus – bitte danach alle Angaben prüfen.</p>
            <label style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "8px 14px", border: `1px solid ${C.LINE}`, borderRadius: 5, cursor: extracting ? "default" : "pointer", background: extracting ? "#F0EDE4" : "#fff", fontSize: 13, fontWeight: 500, color: C.INK }}>
              {extracting ? <Loader2 size={15} className="animate-spin" /> : <Upload size={15} />}
              {extracting ? "Wird gelesen…" : "PDF auswählen"}

            <p style={{ fontSize: 12, color: C.SLATE, marginTop: 8 }}>Listenwert: <strong style={{ color: C.INK }}>{lw > 0 ? fmtCHF(lw) : "keine Einzelpreise"}</strong></p>
          </div>

          {/* Zahlungskomponenten */}
          <div style={section}>
            <p style={sectionTitle}>Leistungen des Partners — Zahlung (Cash / WIR / Barter)</p>
            {form.zahlungskomponenten.map((c, i) => (

// ─── Haupt-App ────────────────────────────────────────────────────────────────
function App(props) {
  const [sponsors, setSponsors] = useState([]);
  const [leads, setLeads] = useState([]);
  const [interessenten, setInteressenten] = useState([]);
  const [tab, setTab] = useState("vertraege");
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [modalSponsor, setModalSponsor] = useState(null);
  const [modalLead, setModalLead] = useState(null);
  const [search, setSearch] = useState("");
  const [tierFilter, setTierFilter] = useState("Alle");
  const [typeFilter, setTypeFilter] = useState("Alle");
  const [statusFilter, setStatusFilter] = useState("Alle");
  const [expanded, setExpanded] = useState({});
  const [expandedLeads, setExpandedLeads] = useState({});
  const [confirmDel, setConfirmDel] = useState(null);
  const [leadSearch, setLeadSearch] = useState("");
  const [leadStatusF, setLeadStatusF] = useState("Alle");
  const [leadPersonF, setLeadPersonF] = useState("Alle");
  const [confirmDelLead, setConfirmDelLead] = useState(null);
  const [modalInteressent, setModalInteressent] = useState(null);
  const [confirmDelInt, setConfirmDelInt] = useState(null);
  const [intSearch, setIntSearch] = useState("");
  const [dismissed, setDismissed] = useState([]);
  const [seedKey, setSeedKey] = useState(SEED_REGISTRY[0].key);

  // ─ Laden ──────────────────────────────────────────────────────────────────
  useEffect(() => {
    (async () => {
      let list = [], dis = [], ls = [];
      try {
        const r = await AppStorage.get("appData");
        const p = r ? JSON.parse(r.value) : null;
        list = p?.sponsors || []; dis = p?.dismissedTemplates || []; ls = (p?.leads || []).map(migrateLead);
        setInteressenten(p?.interessenten || []);
      } catch {
        try { const lsVal = localStorage.getItem("ehc_sponsors"); list = lsVal ? JSON.parse(lsVal) : []; } catch { list = []; }
      }
      setDismissed(dis); setLeads(ls);
      const missing = SEED_REGISTRY.filter((e) => !dis.includes(e.name)).map((e) => e.fn()).filter((s) => !list.some((x) => x.name === s.name));
      const merged = missing.length > 0 ? [...list, ...missing] : list;
      setSponsors(merged);
      if (missing.length > 0) { try { await AppStorage.set("appData", JSON.stringify({ sponsors: merged, dismissedTemplates: dis, leads: ls })); } catch {} }
      setLoading(false);
    })();
  }, []);

  async function persist(nextS, nextDis, nextL, nextInt) {
    const d = nextDis !== undefined ? nextDis : dismissed;
    const l = nextL !== undefined ? nextL : leads;
    const ints = nextInt !== undefined ? nextInt : interessenten;
    setSponsors(nextS);
    if (nextDis !== undefined) setDismissed(nextDis);
    if (nextL !== undefined) setLeads(nextL);
    if (nextInt !== undefined) setInteressenten(nextInt);
    setSaving(true);
    try { await AppStorage.set("appData", JSON.stringify({ sponsors: nextS, dismissedTemplates: d, leads: l, interessenten: ints })); }
    catch {} finally { setSaving(false); }
  }

  function saveSponsor(form) {
    const ex = sponsors.some((s) => s.id === form.id);
    persist(ex ? sponsors.map((s) => s.id === form.id ? form : s) : [...sponsors, form]);
    setModalSponsor(null);
  }
  function delSponsor(id) {
    const t = sponsors.find((s) => s.id === id);
    const nd = t && SEED_REGISTRY.some((e) => e.name === t.name) && !dismissed.includes(t.name) ? [...dismissed, t.name] : undefined;
    persist(sponsors.filter((s) => s.id !== id), nd);
    setConfirmDel(null);
  }
  function saveLead(form) {
    const ex = leads.some((l) => l.id === form.id);
    persist(sponsors, undefined, ex ? leads.map((l) => l.id === form.id ? form : l) : [...leads, form]);
    setModalLead(null);
  }
  function delLead(id) {
    persist(sponsors, undefined, leads.filter((l) => l.id !== id));
    setConfirmDelLead(null);
  }
  function saveInteressent(form) {
    const ex = interessenten.some((i) => i.id === form.id);
    persist(sponsors, undefined, undefined, ex ? interessenten.map((i) => i.id === form.id ? form : i) : [...interessenten, form]);
    setModalInteressent(null);
  }
  function delInteressent(id) {
    persist(sponsors, undefined, undefined, interessenten.filter((i) => i.id !== id));
    setConfirmDelInt(null);
  }
  function interessentToLead(int) {
    const newLead = { ...emptyLead(), firma: int.firma, internPerson: int.internPerson, ansprechpartnerName: int.kontaktName || "", ansprechpartnerRolle: int.kontaktRolle || "", ansprechpartnerEmail: int.kontaktEmail || "", ansprechpartnerTelefon: int.kontaktTelefon || "", notizen: int.notizen, offerten: int.potenzialCHF || int.potenzialBarter ? [{ ...emptyOfferte(), wertCHF: int.potenzialCHF || "", wertBarter: int.potenzialBarter || "", beschreibung: "Erstofferte (aus Lead-Liste)" }] : [] };
    persist(sponsors, undefined, [...leads, newLead], interessenten.filter((i) => i.id !== int.id));
    setTab("pipeline");
  }

  function leadToInteressent(lead) {
    const currOff = aktuelleOfferte(lead);
    const newInt = { ...emptyInteressent(), firma: lead.firma, internPerson: lead.internPerson, kontaktName: lead.ansprechpartnerName || "", kontaktRolle: lead.ansprechpartnerRolle || "", kontaktEmail: lead.ansprechpartnerEmail || "", kontaktTelefon: lead.ansprechpartnerTelefon || "", potenzialCHF: currOff?.wertCHF || "", potenzialBarter: currOff?.wertBarter || "", notizen: lead.notizen };
    persist(sponsors, undefined, leads.filter((l) => l.id !== lead.id), [...interessenten, newInt]);
  }

  // ─ Stats & Filter ──────────────────────────────────────────────────────────
  const stats = useMemo(() => {
    const active = sponsors.filter((s) => contractStatus(s).key !== "abgelaufen");
    const sumT = (typ) => active.reduce((s, sp) => s + (sp.zahlungskomponenten || []).filter((c) => c.typ === typ).reduce((a, c) => a + signedBetrag(c), 0), 0);
    return { activeCount: active.length, cash: sumT("Cash (CHF)"), wir: sumT("WIR-Geld"), barter: sumT("Barter (Sach-/Dienstleistung)"), expiring: sponsors.filter((s) => contractStatus(s).key === "laeuft_aus").length, overdue: sponsors.filter(hasOverdue).length };
  }, [sponsors]);

  const donutData = useMemo(() => {
    const by = {};
    sponsors.filter((s) => contractStatus(s).key !== "abgelaufen").forEach((s) => { by[s.kategorie] = (by[s.kategorie] || 0) + effektiverWert(s); });
    return Object.entries(by).map(([name, value]) => ({ name, value }));
  }, [sponsors]);

  const filtered = useMemo(() => sponsors
    .filter((s) => tierFilter === "Alle" || s.kategorie === tierFilter)
    .filter((s) => typeFilter === "Alle" || (s.zahlungskomponenten || []).some((c) => c.typ === typeFilter))
    .filter((s) => { if (statusFilter === "Alle") return true; if (statusFilter === "ueberfaellig") return hasOverdue(s); return contractStatus(s).key === statusFilter; })
    .filter((s) => matchesSearch(s, search))
    .sort((a, b) => (daysUntil(a.vertragsende) ?? 9999) - (daysUntil(b.vertragsende) ?? 9999))
  , [sponsors, tierFilter, typeFilter, statusFilter, search]);

  const pipePersonen = useMemo(() => [...new Set(leads.map((l) => l.internPerson).filter(Boolean))].sort(), [leads]);
  const filteredLeads = useMemo(() => leads
    .filter((l) => {
      if (leadStatusF === "Alle") return true;
      if (leadStatusF === "__aktiv__") return !PIPELINE_STATUS_ABGESCHLOSSEN.includes(l.status);
      if (leadStatusF === "__abgeschlossen__") return PIPELINE_STATUS_ABGESCHLOSSEN.includes(l.status);
      return l.status === leadStatusF;
    })
    .filter((l) => leadPersonF === "Alle" || l.internPerson === leadPersonF)
    .filter((l) => !leadSearch || l.firma.toLowerCase().includes(leadSearch.toLowerCase()) || (l.offerten || []).some((o) => (o.beschreibung || "").toLowerCase().includes(leadSearch.toLowerCase())) || (l.notizen || "").toLowerCase().includes(leadSearch.toLowerCase()))
    .sort((a, b) => {
      // Abgeschlossene ans Ende
      const aA = PIPELINE_STATUS_ABGESCHLOSSEN.includes(a.status);
      const bA = PIPELINE_STATUS_ABGESCHLOSSEN.includes(b.status);
      if (aA !== bA) return aA ? 1 : -1;
      if (!a.naechsteAktionDatum && !b.naechsteAktionDatum) return 0;
      if (!a.naechsteAktionDatum) return 1;
      if (!b.naechsteAktionDatum) return -1;
      return a.naechsteAktionDatum.localeCompare(b.naechsteAktionDatum);
    })
  , [leads, leadStatusF, leadPersonF, leadSearch]);

  const pipeStats = useMemo(() => {
    const ak = leads.filter((l) => !PIPELINE_STATUS_ABGESCHLOSSEN.includes(l.status));
    return {
      aktiv: ak.length,
      potenzialCHF: ak.reduce((s, l) => { const o = aktuelleOfferte(l); return s + (Number(o?.wertCHF) || 0); }, 0),
      potenzialBarter: ak.reduce((s, l) => { const o = aktuelleOfferte(l); return s + (Number(o?.wertBarter) || 0); }, 0),
      faellig: leads.filter((l) => l.naechsteAktionDatum && !PIPELINE_STATUS_ABGESCHLOSSEN.includes(l.status) && daysUntil(l.naechsteAktionDatum) <= 7).length,
      angenommen: leads.filter((l) => l.status === "Angebot angenommen").length,
      abgelehnt: leads.filter((l) => l.status === "Angebot abgelehnt").length,
    };
  }, [leads]);

  const availableSeeds = SEED_REGISTRY.filter((e) => !dismissed.includes(e.name) && !sponsors.some((s) => s.name === e.name));
  const donutColors = { Hauptsponsor: C.RED, Gold: "#8E1226", Silber: C.SLATE, Bronze: "#9C9686", Partner: "#C9C3B4" };

  if (loading) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: C.PAPER }}><Loader2 className="animate-spin" style={{ color: C.RED }} /></div>;

  return (
    <div style={{ minHeight: "100vh", background: C.PAPER, fontFamily: "'Inter', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap'); * { box-sizing: border-box; } input[type=number]::-webkit-inner-spin-button { opacity: 1; } ::placeholder { color: #B4AEA0; } .animate-spin { animation: spin 1s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }`}</style>

      {/* Header */}
      <header style={{ background: `linear-gradient(180deg, ${C.INK} 0%, #1c1c22 100%)`, color: "#fff" }}>
        <div style={{ maxWidth: 1152, margin: "0 auto", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ width: 38, height: 38, borderRadius: 4, background: C.RED, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700, fontSize: 13, fontFamily: "'Oswald', sans-serif" }}>EHC</div>
            <div>
              <div style={{ fontSize: 16, fontWeight: 700, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.04em" }}>CHUR · SPONSORING</div>
              <div style={{ fontSize: 11, color: "rgba(247,244,238,0.5)" }}>Partnerschafts-Übersicht{saving ? " · speichert…" : ""}</div>
            </div>
          </div>
          <button onClick={() => setEditMode((v) => !v)} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, fontWeight: 500, padding: "6px 14px", borderRadius: 99, border: "1px solid rgba(247,244,238,0.25)", color: editMode ? "#fff" : "rgba(247,244,238,0.7)", background: editMode ? C.RED : "transparent", cursor: "pointer" }}>
            {editMode ? <Unlock size={13} /> : <Lock size={13} />}{editMode ? "Bearbeitungsmodus" : "Nur ansehen"}
            </button>
            {props && props.onSettingsClick && <button onClick={props.onSettingsClick} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"6px 12px",borderRadius:99,border:"1px solid rgba(247,244,238,0.25)",color:"rgba(247,244,238,0.7)",background:"transparent",cursor:"pointer"}}>⚙ Einstellungen</button>}
            {props.onSettingsClick && <button onClick={props.onSettingsClick} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"6px 12px",borderRadius:99,border:"1px solid rgba(247,244,238,0.25)",color:"rgba(247,244,238,0.7)",background:"transparent",cursor:"pointer"}} title="Einstellungen">⚙</button>
            }
            <div style={{display:"none"}}>
          </div>
        </div>
        <div style={{ maxWidth: 1152, margin: "0 auto", padding: "0 8px", display: "flex", flexWrap: "wrap", borderTop: "1px solid rgba(247,244,238,0.12)" }}>
          <ScoreBox label="Aktive Sponsoren" value={stats.activeCount} />
          <ScoreBox label="Cash netto / Jahr" value={fmtCHF(stats.cash)} neg={stats.cash < 0} />
          <ScoreBox label="WIR-Geld netto / Jahr" value={fmtCHF(stats.wir)} neg={stats.wir < 0} />
          <ScoreBox label="Barter netto / Jahr" value={fmtCHF(stats.barter)} neg={stats.barter < 0} />
          <ScoreBox label="Laufen in 90 Tg. aus" value={stats.expiring} accent={stats.expiring > 0 ? "#F4B860" : null} />
          <ScoreBox label="Überfällig" value={stats.overdue} accent={stats.overdue > 0 ? "#F08A8A" : null} />
        </div>
      </header>

      <main style={{ maxWidth: 1152, margin: "0 auto", padding: "24px" }}>
        {/* Tabs */}
        <div style={{ display: "flex", gap: 4, borderBottom: `1px solid ${C.LINE}`, marginBottom: 24 }}>
          {[{ key: "vertraege", label: "Verträge", Icon: FileSignature }, { key: "pipeline", label: "Verhandlungen / Pipeline", Icon: TrendingUp }].map(({ key, label, Icon }) => (
            <button key={key} onClick={() => setTab(key)} style={{ display: "flex", alignItems: "center", gap: 7, padding: "10px 16px", fontSize: 13, fontWeight: 700, fontFamily: "'Oswald', sans-serif", letterSpacing: "0.04em", background: "none", border: "none", borderBottom: `2px solid ${tab === key ? C.RED : "transparent"}`, marginBottom: -1, cursor: "pointer", color: tab === key ? C.RED : C.SLATE }}>
              <Icon size={15} />{label}
            </button>
          ))}
        </div>

        {/* ── VERTRÄGE ── */}
        {tab === "vertraege" && (
          <>
            {/* Filter */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
              <div style={{ position: "relative", flex: 1, minWidth: 180 }}>
                <Search size={15} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.SLATE }} />
                <input style={{ ...inpStyle, paddingLeft: 34 }} placeholder="Sponsor, Spezifikation oder Leistung suchen…" value={search} onChange={(e) => setSearch(e.target.value)} />
              </div>
              <Sel style={{ ...inpStyle, width: "auto" }} value={tierFilter} onChange={(e) => setTierFilter(e.target.value)}><option>Alle</option>{TIERS.map((t) => <option key={t}>{t}</option>)}</Sel>
              <Sel style={{ ...inpStyle, width: "auto" }} value={typeFilter} onChange={(e) => setTypeFilter(e.target.value)}><option value="Alle">Alle Zahlungsarten</option>{VERTRAGSTYPEN.map((t) => <option key={t} value={t}>{t}</option>)}</Sel>
              <Sel style={{ ...inpStyle, width: "auto" }} value={statusFilter} onChange={(e) => setStatusFilter(e.target.value)}><option value="Alle">Alle Status</option><option value="aktiv">Aktiv</option><option value="laeuft_aus">Läuft aus</option><option value="abgelaufen">Abgelaufen</option><option value="ueberfaellig">Zahlung überfällig</option></Sel>
              {editMode && (
                <div style={{ display: "flex", gap: 8 }}>
                  {availableSeeds.length > 0 && <>
                    <Sel style={{ ...inpStyle, width: "auto" }} value={seedKey} onChange={(e) => setSeedKey(e.target.value)}>{availableSeeds.map((e) => <option key={e.key} value={e.key}>{e.label}</option>)}</Sel>
                    <button onClick={() => { const e = availableSeeds.find((x) => x.key === seedKey) || availableSeeds[0]; if (e) setModalSponsor(e.fn()); }} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 14px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.INK }}><FileSignature size={14} />Vorlage übernehmen</button>
                  </>}
                  <button onClick={() => setModalSponsor(emptySponsor())} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", border: "none", borderRadius: 5, background: C.RED, cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff", fontFamily: "'Oswald', sans-serif" }}><Plus size={16} />Sponsor erfassen</button>
                </div>
              )}
            </div>

            {/* Grid */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 260px", gap: 24 }}>
              <div>
                {filtered.length === 0 && (
                  <div style={{ border: `1px solid ${C.LINE}`, borderRadius: 8, padding: "40px 24px", textAlign: "center", background: "#fff" }}>
                    <p style={{ fontWeight: 600, color: C.INK, margin: "0 0 6px" }}>{sponsors.length === 0 ? "Noch keine Sponsoren erfasst" : "Keine Treffer"}</p>
                    <p style={{ fontSize: 14, color: C.SLATE, margin: 0 }}>{sponsors.length === 0 ? "Aktiviere den Bearbeitungsmodus und erfasse den ersten Partner." : "Suche oder Filter anpassen."}</p>
                  </div>
                )}
                {filtered.map((s) => {
                  const st = contractStatus(s);
                  const ew = effektiverWert(s);
                  const lw = listenwert(s);
                  const open = !!expanded[s.id];
                  const borderL = st.tone === "danger" ? C.RED : st.tone === "warn" ? "#E0A100" : C.INK;
                  return (
                    <div key={s.id} style={{ background: "#fff", borderRadius: 8, border: `1px solid ${C.LINE}`, borderLeft: `4px solid ${borderL}`, marginBottom: 12, overflow: "hidden" }}>
                      <button onClick={() => setExpanded((e) => ({ ...e, [s.id]: !e[s.id] }))} style={{ width: "100%", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, padding: "16px 18px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                        <div style={{ display: "flex", gap: 10 }}>
                          {open ? <ChevronDown size={16} style={{ color: C.SLATE, marginTop: 3, flexShrink: 0 }} /> : <ChevronRight size={16} style={{ color: C.SLATE, marginTop: 3, flexShrink: 0 }} />}
                          <div>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 6 }}>
                              <span style={{ fontWeight: 700, fontSize: 15, color: C.INK }}>{s.name}</span>
                              <TierBadge tier={s.kategorie} />
                            </div>
                            <StatusPill status={st} />
                          </div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: C.INK, fontSize: 16 }}>{fmtCHF(ew)}</div>
                          <div style={{ fontSize: 11, color: C.SLATE }}>{lw > ew && lw > 0 ? `effektiv · Listenwert ${fmtCHF(lw)}` : "effektiv / Jahr"}</div>
                        </div>
                      </button>

                      {open && (
                        <div style={{ padding: "0 18px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
                          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, paddingTop: 12, borderTop: `1px solid ${C.LINE}` }}>
                            <div>
                              <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 3 }}>Laufzeit</p>
                              <p style={{ fontSize: 13, color: C.INK, margin: 0 }}>{fmtDate(s.vertragsbeginn)} – {fmtDate(s.vertragsende)}</p>
                              {s.optionVerlaengerung && <p style={{ fontSize: 12, color: C.SLATE, margin: "2px 0 0" }}>Option auf Verlängerung</p>}
                            </div>
                            <div>
                              <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 3 }}>Ansprechpartner</p>
                              <p style={{ fontSize: 13, color: C.INK, margin: 0 }}>{s.ansprechpartnerName || "—"}{s.ansprechpartnerRolle ? ` · ${s.ansprechpartnerRolle}` : ""}</p>
                              <div style={{ display: "flex", gap: 12, marginTop: 2 }}>
                                {s.ansprechpartnerEmail && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 4 }}><Mail size={11} />{s.ansprechpartnerEmail}</span>}
                                {s.ansprechpartnerTelefon && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 4 }}><Phone size={11} />{s.ansprechpartnerTelefon}</span>}
                              </div>
                            </div>
                          </div>

                          {(s.werbeleistungen || []).some((w) => w.name) && (
                            <div style={{ paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                              <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 6 }}>Spezifikationen Werbeträger</p>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {s.werbeleistungen.filter((w) => w.name).map((w) => (
                                  <span key={w.id} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "3px 9px", borderRadius: 4, fontSize: 11, background: "#F0EDE4", color: C.INK }}>
                                    <Tag size={10} />{w.name}{Number(w.wert) > 0 ? ` · ${fmtCHF(w.wert)}` : ""}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )}

                          {(s.zahlungskomponenten || []).length > 0 && (
                            <div style={{ paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                              <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 4 }}>Zahlung des Partners</p>
                              {s.zahlungskomponenten.map((c) => <PayChip key={c.id} comp={c} />)}
                            </div>
                          )}

                          {s.ehcLeistungen && (
                            <div style={{ paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                              <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 6 }}>Leistungen EHC Chur</p>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                                {s.ehcLeistungen.split(",").filter((g) => g.trim()).map((g, i) => (
                                  <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "2px 8px", borderRadius: 4, fontSize: 11, background: "#EFEAE0", color: C.INK }}><Tag size={10} />{g.trim()}</span>
                                ))}
                              </div>
                            </div>
                          )}

                          {s.internKontaktEHC && <p style={{ fontSize: 12, color: C.SLATE, margin: 0 }}>Intern zuständig: {s.internKontaktEHC}</p>}
                          {s.notizen && <p style={{ fontSize: 13, fontStyle: "italic", color: C.SLATE, margin: 0 }}>{s.notizen}</p>}

                          {editMode && (
                            <div style={{ display: "flex", gap: 8, paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                              <button onClick={() => setModalSponsor(s)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.INK }}><Pencil size={13} />Bearbeiten</button>
                              {confirmDel === s.id
                                ? <><button onClick={() => delSponsor(s.id)} style={{ padding: "6px 12px", borderRadius: 5, border: "none", background: C.RED2, cursor: "pointer", fontSize: 13, fontWeight: 500, color: "#fff" }}>Wirklich löschen</button><button onClick={() => setConfirmDel(null)} style={{ padding: "6px 12px", background: "none", border: "none", cursor: "pointer", fontSize: 13, color: C.SLATE }}>Abbrechen</button></>
                                : <button onClick={() => setConfirmDel(s.id)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.RED2 }}><Trash2 size={13} />Löschen</button>
                              }
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* Sidebar */}
              <aside>
                <div style={{ border: `1px solid ${C.LINE}`, borderRadius: 8, padding: 16, background: "#fff", marginBottom: 12 }}>
                  <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 8 }}>Wert nach Kategorie</p>
                  {donutData.length === 0 ? <p style={{ fontSize: 14, color: C.SLATE, textAlign: "center", padding: "32px 0" }}>Keine Daten</p> : (
                    <div style={{ height: 220 }}>
                      <ResponsiveContainer width="100%" height="100%">
                        <PieChart><Pie data={donutData} dataKey="value" nameKey="name" innerRadius={50} outerRadius={80} paddingAngle={2}>{donutData.map((d, i) => <Cell key={i} fill={donutColors[d.name] || C.SLATE} />)}</Pie><Tooltip formatter={(v) => fmtCHF(v)} /><Legend wrapperStyle={{ fontSize: 12 }} /></PieChart>
                      </ResponsiveContainer>
                    </div>
                  )}
                </div>
                <div style={{ borderRadius: 8, padding: 14, background: "#EFEAE0", fontSize: 12, lineHeight: 1.6, color: C.SLATE }}>
                  Cash/WIR/Barter sind <strong>netto</strong>: Einnahmen minus Ausgaben des EHC Chur. Der Bearbeitungsmodus-Schalter ist eine lokale Ansichtssteuerung, kein Login.
                </div>
              </aside>
            </div>
          </>
        )}

        {/* ── PIPELINE ── */}
        {tab === "pipeline" && (
          <>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 10, marginBottom: 20 }}>
              {[
                { label: "Aktive Verhandlungen", value: pipeStats.aktiv, color: "#2A5FC4" },
                { label: "Potenzial CHF", value: fmtCHF(pipeStats.potenzialCHF), color: C.INK },
                { label: "Potenzial Barter", value: fmtCHF(pipeStats.potenzialBarter), color: "#6B2FAB" },
                { label: "Follow-up fällig (7 Tg.)", value: pipeStats.faellig, color: pipeStats.faellig > 0 ? C.RED : C.INK },
                { label: "Angebote angenommen", value: pipeStats.angenommen, color: "#3C6B2F" },
                { label: "Angebote abgelehnt", value: pipeStats.abgelehnt, color: pipeStats.abgelehnt > 0 ? C.RED2 : C.INK },
              ].map((s) => (
                <div key={s.label} style={{ borderRadius: 8, padding: "12px 14px", background: "#fff", border: `1px solid ${C.LINE}` }}>
                  <p style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", margin: "0 0 4px" }}>{s.label}</p>
                  <p style={{ fontSize: 18, fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: s.color, margin: 0 }}>{s.value}</p>
                </div>
              ))}
            </div>

            {/* Filter */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
              <div style={{ position: "relative", flex: 1, minWidth: 160 }}>
                <Search size={15} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: C.SLATE }} />
                <input style={{ ...inpStyle, paddingLeft: 34 }} placeholder="Firma, Offerte oder Notizen suchen…" value={leadSearch} onChange={(e) => setLeadSearch(e.target.value)} />
              </div>
              <Sel style={{ ...inpStyle, width: "auto" }} value={leadStatusF} onChange={(e) => setLeadStatusF(e.target.value)}>
                <option value="Alle">Alle Status</option>
                <option value="__aktiv__">── Aktive ──</option>
                {PIPELINE_STATUS.filter((s) => !PIPELINE_STATUS_ABGESCHLOSSEN.includes(s)).map((s) => <option key={s}>{s}</option>)}
                <option value="__abgeschlossen__">── Abgeschlossene ──</option>
                {PIPELINE_STATUS_ABGESCHLOSSEN.map((s) => <option key={s}>{s}</option>)}
              </Sel>
              {pipePersonen.length > 0 && <Sel style={{ ...inpStyle, width: "auto" }} value={leadPersonF} onChange={(e) => setLeadPersonF(e.target.value)}><option value="Alle">Alle Personen</option>{pipePersonen.map((p) => <option key={p}>{p}</option>)}</Sel>}
              {editMode && <button onClick={() => setModalLead(emptyLead())} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", border: "none", borderRadius: 5, background: C.RED, cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff", fontFamily: "'Oswald', sans-serif" }}><Plus size={16} />Verhandlung erfassen</button>}
            </div>


            {filteredLeads.map((l) => {
              const cfg = PIPE_CFG[l.status] || PIPE_CFG["Erstkontakt"];
              const dN = l.naechsteAktionDatum ? daysUntil(l.naechsteAktionDatum) : null;
              const urgent = dN !== null && dN <= 7;
              const isOpen = !!expandedLeads[l.id];
              const isAbgeschlossen = PIPELINE_STATUS_ABGESCHLOSSEN.includes(l.status);
              const offs = l.offerten || [];
              const currOff = aktuelleOfferte(l);
              return (
                <div key={l.id} style={{ background: "#fff", borderRadius: 8, border: `1px solid ${C.LINE}`, borderLeft: `4px solid ${cfg.dot}`, marginBottom: 12, overflow: "hidden" }}>
                  {/* Kopfzeile – immer sichtbar, klickbar */}
                  <button onClick={() => setExpandedLeads((e) => ({ ...e, [l.id]: !e[l.id] }))} style={{ width: "100%", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, padding: "14px 18px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
                    <div style={{ display: "flex", gap: 10 }}>
                      {isOpen ? <ChevronDown size={16} style={{ color: C.SLATE, marginTop: 3, flexShrink: 0 }} /> : <ChevronRight size={16} style={{ color: C.SLATE, marginTop: 3, flexShrink: 0 }} />}
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 15, color: C.INK, marginBottom: 6 }}>{l.firma}</div>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                          <PipeBadge status={l.status} />
                          {l.internPerson && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 5 }}><User size={12} />{l.internPerson}</span>}
                          {offs.length > 1 && <span style={{ fontSize: 11, color: C.SLATE, background: "#F0EDE4", padding: "1px 7px", borderRadius: 99 }}>{offs.length} Offerten</span>}
                          {urgent && !isAbgeschlossen && <span style={{ fontSize: 11, fontWeight: 600, color: C.RED2, background: "#F8DEDE", padding: "2px 8px", borderRadius: 99 }}>Follow-up {dN === 0 ? "heute" : dN < 0 ? "überfällig" : `in ${dN} Tg.`}</span>}
                        </div>
                      </div>
                    </div>
                    {currOff && (Number(currOff.wertCHF) > 0 || Number(currOff.wertBarter) > 0) && (
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        {Number(currOff.wertCHF) > 0 && <div style={{ fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: C.INK, fontSize: 15 }}>{fmtCHF(currOff.wertCHF)} Cash</div>}
                        {Number(currOff.wertBarter) > 0 && <div style={{ fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: "#6B2FAB", fontSize: 15 }}>{fmtCHF(currOff.wertBarter)} Barter</div>}
                        <div style={{ fontSize: 11, color: C.SLATE }}>aktuelle Offerte</div>
                      </div>
                    )}
                  </button>

                  {/* Detail – nur bei aufgeklappter Karte */}
                  {isOpen && (
                    <div style={{ padding: "0 18px 16px", display: "flex", flexDirection: "column", gap: 12 }}>
                      {/* Offerten-Verlauf */}
                      {offs.length > 0 && (
                        <div style={{ paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                          <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 8 }}>Offerten-Verlauf</p>
                          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                            {offs.map((o, i) => {
                              const isCurrent = i === offs.length - 1;
                              return (
                                <div key={o.id} style={{ display: "flex", gap: 10, alignItems: "flex-start", opacity: isCurrent ? 1 : 0.6 }}>
                                  <div style={{ width: 3, borderRadius: 2, background: isCurrent ? "#4A7FE8" : C.LINE, alignSelf: "stretch", flexShrink: 0, marginTop: 3 }} />
                                  <div style={{ flex: 1 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 2 }}>
                                      <span style={{ fontSize: 11, color: C.SLATE }}>{fmtDate(o.datum)}</span>
                                      {Number(o.wertCHF) > 0 && <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: isCurrent ? C.INK : C.SLATE, textDecoration: isCurrent ? "none" : "line-through" }}>CHF {fmtCHF(o.wertCHF)}</span>}
                                      {Number(o.wertBarter) > 0 && <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: isCurrent ? "#6B2FAB" : C.SLATE, textDecoration: isCurrent ? "none" : "line-through" }}>Barter {fmtCHF(o.wertBarter)}</span>}
                                      {isCurrent ? <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 7px", borderRadius: 99, background: "#EAF0FB", color: "#2A5FC4" }}>Aktuell</span> : <span style={{ fontSize: 10, padding: "1px 7px", borderRadius: 99, background: "#F0EDE4", color: C.SLATE }}>Überholt</span>}
                                    </div>
                                    {o.beschreibung && (
                                      <p style={{ fontSize: 12, color: isCurrent ? C.INK : C.SLATE, margin: 0, textDecoration: isCurrent ? "none" : "line-through", lineHeight: 1.5 }}>{o.beschreibung}</p>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      )}
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                        {l.letzterKontakt && (
                          <div>
                            <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 3 }}>Letzter Kontakt</p>
                            <p style={{ fontSize: 13, color: C.INK, margin: 0, display: "flex", alignItems: "center", gap: 5 }}><Calendar size={12} style={{ color: C.SLATE }} />{fmtDate(l.letzterKontakt)}</p>
                          </div>
                        )}
                        {l.naechsteAktionDatum && (
                          <div>
                            <p style={{ fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: C.SLATE, fontFamily: "'Oswald', sans-serif", marginBottom: 3 }}>Nächste Aktion</p>
                            <p style={{ fontSize: 13, color: urgent ? C.RED2 : C.INK, margin: 0, display: "flex", alignItems: "center", gap: 5 }}>
                              <Calendar size={12} style={{ color: urgent ? C.RED2 : C.SLATE }} />{fmtDate(l.naechsteAktionDatum)}
                              {dN === 0 && " · Heute"}{dN !== null && dN > 0 && dN <= 7 && ` · in ${dN} Tag${dN === 1 ? "" : "en"}`}{dN !== null && dN < 0 && " · Überfällig"}
                            </p>
                            {l.naechsteAktion && <p style={{ fontSize: 12, color: C.SLATE, margin: "2px 0 0" }}>{l.naechsteAktion}</p>}
                          </div>
                        )}
                      </div>
                      {l.notizen && <p style={{ fontSize: 13, fontStyle: "italic", color: C.SLATE, margin: 0 }}>{l.notizen}</p>}
                      {editMode && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, paddingTop: 10, borderTop: `1px solid ${C.LINE}` }}>
                          <button onClick={() => setModalLead(l)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.INK }}><Pencil size={13} />Bearbeiten</button>
                          {confirmDelLead === l.id
                            ? <><button onClick={() => delLead(l.id)} style={{ padding: "6px 12px", borderRadius: 5, border: "none", background: C.RED2, cursor: "pointer", fontSize: 13, fontWeight: 500, color: "#fff" }}>Wirklich löschen</button><button onClick={() => setConfirmDelLead(null)} style={{ padding: "6px 12px", background: "none", border: "none", cursor: "pointer", fontSize: 13, color: C.SLATE }}>Abbrechen</button></>
                            : <button onClick={() => setConfirmDelLead(l.id)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.RED2 }}><Trash2 size={13} />Löschen</button>
                          }
                          {/* Schnell-Aktionen für Offerten-Entscheid */}
                          {l.status !== "Angebot angenommen" && l.status !== "Angebot abgelehnt" && (
                            <div style={{ display: "flex", gap: 8, marginLeft: "auto" }}>
                              <button onClick={() => saveLead({ ...l, status: "Angebot angenommen" })} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: "1px solid #C8E0C0", borderRadius: 5, background: "#E9EFE7", cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#3C6B2F" }}>
                                <CheckCircle2 size={13} />Angenommen
                              </button>
                              <button onClick={() => saveLead({ ...l, status: "Angebot abgelehnt" })} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid #F0C0C0`, borderRadius: 5, background: "#F8DEDE", cursor: "pointer", fontSize: 13, fontWeight: 600, color: C.RED2 }}>
                                <XCircle size={13} />Abgelehnt
                              </button>
                            </div>
                          )}
                          {/* Rückstufung: zurück in Verhandlung oder zurück in Lead-Liste */}
                          <div style={{ display: "flex", gap: 8, marginLeft: isAbgeschlossen ? "auto" : 0 }}>
                            {isAbgeschlossen && l.status !== "Abgebrochen" && (
                              <button onClick={() => saveLead({ ...l, status: "Verhandlung" })} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 500, color: C.SLATE }}>
                                ↩ Zurück in Verhandlung
                              </button>
                            )}
                            <button onClick={() => leadToInteressent(l)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 12px", border: "1px solid #E0A100", borderRadius: 5, background: "#FCEDD9", cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#9A5B00" }} title="Zurück in Lead-Liste verschieben">
                              ↩ Zurück in Lead-Liste
                            </button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}

            {/* ── INTERESSENTEN ── */}
            <div style={{ marginTop: 36, borderTop: `2px solid ${C.LINE}`, paddingTop: 24 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, flexWrap: "wrap", gap: 10 }}>
                <div>
                  <h2 style={{ fontSize: 16, fontWeight: 700, fontFamily: "'Oswald', sans-serif", color: C.INK, margin: "0 0 3px" }}>Lead-Liste / Interessenten</h2>
                  <p style={{ fontSize: 13, color: C.SLATE, margin: 0 }}>Firmen, mit denen wir noch in Kontakt treten wollen</p>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ position: "relative" }}>
                    <Search size={14} style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", color: C.SLATE }} />
                    <input style={{ ...inpStyle, paddingLeft: 30, width: 180 }} placeholder="Suchen…" value={intSearch} onChange={(e) => setIntSearch(e.target.value)} />
                  </div>
                  {editMode && <button onClick={() => setModalInteressent(emptyInteressent())} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 16px", border: "none", borderRadius: 5, background: "#E0A100", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#fff", fontFamily: "'Oswald', sans-serif" }}><Plus size={16} />Interessent erfassen</button>}
                </div>
              </div>

              {interessenten.filter((i) => !intSearch || i.firma.toLowerCase().includes(intSearch.toLowerCase()) || (i.notizen || "").toLowerCase().includes(intSearch.toLowerCase())).length === 0 && (
                <div style={{ border: `1px solid ${C.LINE}`, borderRadius: 8, padding: "32px 24px", textAlign: "center", background: "#fff" }}>
                  <p style={{ fontWeight: 600, color: C.INK, margin: "0 0 5px" }}>{interessenten.length === 0 ? "Noch keine Interessenten erfasst" : "Keine Treffer"}</p>
                  <p style={{ fontSize: 13, color: C.SLATE, margin: 0 }}>Firmen eintragen, die ihr als Sponsoren gewinnen wollt.</p>
                </div>
              )}

              <div style={{ display: "grid", gap: 10 }}>
                {interessenten
                  .filter((i) => !intSearch || i.firma.toLowerCase().includes(intSearch.toLowerCase()) || (i.notizen || "").toLowerCase().includes(intSearch.toLowerCase()))
                  .map((int) => (
                    <div key={int.id} style={{ background: "#fff", borderRadius: 8, border: `1px solid ${C.LINE}`, borderLeft: "4px solid #E0A100", padding: "14px 18px" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 5 }}>
                            <span style={{ fontWeight: 700, fontSize: 15, color: C.INK }}>{int.firma}</span>
                            {int.branche && <span style={{ fontSize: 11, padding: "1px 8px", borderRadius: 99, background: "#F0EDE4", color: C.SLATE }}>{int.branche}</span>}
                            {int.internPerson && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 4 }}><User size={12} />{int.internPerson}</span>}
                          </div>
                          {(Number(int.potenzialCHF) > 0 || Number(int.potenzialBarter) > 0) && (
                            <div style={{ display: "flex", gap: 10, marginBottom: 4 }}>
                              {Number(int.potenzialCHF) > 0 && <span style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Oswald', sans-serif", color: C.INK }}>{fmtCHF(int.potenzialCHF)} Cash</span>}
                              {Number(int.potenzialBarter) > 0 && <span style={{ fontSize: 13, fontWeight: 600, fontFamily: "'Oswald', sans-serif", color: "#6B2FAB" }}>{fmtCHF(int.potenzialBarter)} Barter</span>}
                              <span style={{ fontSize: 11, color: C.SLATE }}>gesch. Potenzial</span>
                            </div>
                          )}
                          {(int.kontaktName || int.kontaktEmail || int.kontaktTelefon) && (
                            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 4 }}>
                              {int.kontaktName && <span style={{ fontSize: 12, color: C.INK }}>{int.kontaktName}{int.kontaktRolle ? ` · ${int.kontaktRolle}` : ""}</span>}
                              {int.kontaktEmail && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 4 }}><Mail size={11} />{int.kontaktEmail}</span>}
                              {int.kontaktTelefon && <span style={{ fontSize: 12, color: C.SLATE, display: "flex", alignItems: "center", gap: 4 }}><Phone size={11} />{int.kontaktTelefon}</span>}
                            </div>
                          )}
                          {int.notizen && <p style={{ fontSize: 13, color: C.SLATE, margin: 0, fontStyle: "italic" }}>{int.notizen}</p>}
                        </div>
                        {editMode && (
                          <div style={{ display: "flex", gap: 6, flexShrink: 0, flexWrap: "wrap", justifyContent: "flex-end" }}>
                            <button onClick={() => interessentToLead(int)} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "5px 11px", border: "1px solid #4A7FE8", borderRadius: 5, background: "#EAF0FB", cursor: "pointer", fontSize: 12, fontWeight: 600, color: "#2A5FC4" }}>
                              <TrendingUp size={13} />In Verhandlung
                            </button>
                            <button onClick={() => setModalInteressent(int)} style={{ padding: "5px 10px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", color: C.INK }}><Pencil size={13} /></button>
                            {confirmDelInt === int.id
                              ? <><button onClick={() => delInteressent(int.id)} style={{ padding: "5px 10px", borderRadius: 5, border: "none", background: C.RED2, cursor: "pointer", fontSize: 12, color: "#fff" }}>Löschen</button><button onClick={() => setConfirmDelInt(null)} style={{ padding: "5px 10px", background: "none", border: "none", cursor: "pointer", fontSize: 12, color: C.SLATE }}>Abbruch</button></>
                              : <button onClick={() => setConfirmDelInt(int.id)} style={{ padding: "5px 10px", border: `1px solid ${C.LINE}`, borderRadius: 5, background: "#fff", cursor: "pointer", color: C.RED2 }}><Trash2 size={13} /></button>
                            }
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
              </div>
            </div>
          </>
        )}
      </main>

      {modalSponsor && <SponsorModal initial={modalSponsor} onSave={saveSponsor} onClose={() => setModalSponsor(null)} />}
      {modalLead && <LeadModal initial={modalLead} onSave={saveLead} onClose={() => setModalLead(null)} />}
      {modalInteressent && <InteressentModal initial={modalInteressent} onSave={saveInteressent} onClose={() => setModalInteressent(null)} />}
    </div>
  );
}


function AppWithSettings() {
  const [showSettings,setShowSettings]=useState(false);
  useEffect(()=>{ window.__ehcAkey=localStorage.getItem("ehc_akey")||""; },[]);
  return (
    <>
      <App onSettingsClick={()=>setShowSettings(true)} />
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} />}
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<AppWithSettings/>);

  </script>
</body>
</html>
